<div class="container py-5">

  <div class="card shadow">

    <div class="card-header bg-primary text-white">

      <h3>

        @if(editando){

          Editar Mascota

        }@else{

          Registrar Mascota

        }

      </h3>

    </div>

    <div class="card-body">

      <form
        [formGroup]="mascotaForm"
        (ngSubmit)="guardar()">

        <div class="row">

          <div class="col-md-6 mb-3">

            <label>Nombre</label>

            <input
              class="form-control"
              formControlName="nombre">

          </div>

          <div class="col-md-6 mb-3">

            <label>Especie</label>

            <select
              class="form-select"
              formControlName="especie">

              <option value="">Seleccione...</option>

              <option>Perro</option>

              <option>Gato</option>

              <option>Ave</option>

              <option>Conejo</option>

              <option>Otro</option>

            </select>

          </div>

          <div class="col-md-6 mb-3">

            <label>Raza</label>

            <input
              class="form-control"
              formControlName="raza">

          </div>

          <div class="col-md-6 mb-3">

            <label>Edad</label>

            <input
              type="number"
              class="form-control"
              formControlName="edad">

          </div>

          <div class="col-md-6 mb-3">

            <label>Sexo</label>

            <select
              class="form-select"
              formControlName="sexo">

              <option value="">Seleccione...</option>

              <option>Macho</option>

              <option>Hembra</option>

            </select>

          </div>

          <div class="col-md-6 mb-3">

            <label>Nombre del Dueño</label>

            <input
              class="form-control"
              formControlName="nombreDueno">

          </div>

          <div class="col-md-6 mb-4">

            <label>Teléfono</label>

            <input
              class="form-control"
              formControlName="telefono">

          </div>

        </div>

        <button
          class="btn btn-primary w-100">

          @if(editando){

            Actualizar Mascota

          }@else{

            Guardar Mascota

          }

        </button>

      </form>

    </div>

  </div>

</div>
