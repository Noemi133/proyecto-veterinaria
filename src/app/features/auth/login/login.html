<div class="login-container">

    <div class="login-card shadow">

        <div class="text-center mb-4">

            <div class="logo">
                🐶
            </div>

            <h2>Sistema Veterinario</h2>

            <p class="text-muted">
                Iniciar sesión
            </p>

        </div>

        <form
            [formGroup]="loginForm"
            (ngSubmit)="ingresar()">

            <div class="mb-3">

                <label class="form-label">
                    Usuario
                </label>

                <input
                    type="text"
                    class="form-control"
                    formControlName="usuario">

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Contraseña
                </label>

                <input
                    type="password"
                    class="form-control"
                    formControlName="password">

            </div>

            <button
                class="btn btn-primary w-100">

                Ingresar

            </button>

        </form>

    </div>

</div>
