<div class="container py-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>📅 Lista de Citas</h3>

        </div>

        <div class="card-body">

            <div class="mb-4">

                <input
                    class="form-control"
                    placeholder="Buscar por mascota..."
                    [(ngModel)]="filtro">

            </div>

            @if(citasFiltradas.length==0){

                <div class="alert alert-warning">

                    No existen citas registradas.

                </div>

            }

            @else{

                <table class="table table-hover table-striped">

                    <thead>

                        <tr>

                            <th>Mascota</th>

                            <th>Fecha</th>

                            <th>Hora</th>

                            <th>Veterinario</th>

                            <th>Estado</th>

                            <th width="120">Acciones</th>

                        </tr>

                    </thead>

                    <tbody>

                        @for(cita of citasFiltradas; track cita.id){

                            <tr>

                                <td>{{cita.mascotaNombre}}</td>

                                <td>{{cita.fecha}}</td>

                                <td>{{cita.hora}}</td>

                                <td>{{cita.veterinario}}</td>

                                <td>

                                    <span
                                        class="badge"

                                        [appResaltarEstado]="cita.estado"

                                        [class.bg-warning]="cita.estado=='Pendiente'"

                                        [class.bg-success]="cita.estado=='Atendida'"

                                        [class.bg-danger]="cita.estado=='Cancelada'">

                                        {{ cita.estado | estado }}

                                    </span>

                                </td>

                                <td>

                                    <button
                                        class="btn btn-danger btn-sm"
                                        (click)="eliminar(cita.id)">

                                        🗑

                                    </button>

                                </td>

                            </tr>

                        }

                    </tbody>

                </table>

            }

        </div>

    </div>

</div>
